# Mainline pipa: no hybris droidcamsrc.
# Use camerabin wrapper + v4l2src; wrap Camera with libcamerify so nodes
# come from libcamera's V4L2 compatibility layer (see jolla-camera.desktop).
QT_GSTREAMER_CAMERABIN_SRC=wrappercamerabinsrc
QT_GSTREAMER_CAMERABIN_VIDEOSRC=v4l2src
QT_GSTREAMER_PLAYBIN_FLAGS=0
QT_GSTREAMER_CAMERABIN_FLAGS=15
