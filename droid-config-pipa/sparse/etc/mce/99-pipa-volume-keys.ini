# Xiaomi Pad 6 (pipa) volume rockers
#
# Do NOT mark gpio-keys / pm8941_resin as VOLKEY. On eglfs +
# QT_QPA_GENERIC_PLUGINS=evdevkeyboard, lipstick VolumeControl reads
# KEY_VOLUMEUP/DOWN via Qt. Forcing EVDEV_TYPE=VOLKEY is unnecessary
# here (MCE only needs volkey input policy over D-Bus).
#
# Device nodes (mainline DT):
#   gpio-keys     → KEY_VOLUMEUP   (115)  /dev/input/event0
#   pm8941_resin  → KEY_VOLUMEDOWN (114)  /dev/input/event2
