# Xiaomi Pad 6 (pipa) volume rockers
#
# Lipstick VolumeControl reads KEY_VOLUMEUP/DOWN via Qt evdevkeyboard.
# Do NOT mark these as VOLKEY: MCE may disable gpio-keys via sysfs, so
# the compositor never sees presses.
#
# Tell MCE to ignore the nodes; Qt still opens them.
#
# Device nodes (mainline DT):
#   gpio-keys     → KEY_VOLUMEUP   (115)  /dev/input/event0
#   pm8941_resin  → KEY_VOLUMEDOWN (114)  /dev/input/event2

[EVDEV_TYPE]
gpio-keys=IGNORE
pm8941_resin=IGNORE
