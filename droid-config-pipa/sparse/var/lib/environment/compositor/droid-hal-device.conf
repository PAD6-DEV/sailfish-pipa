# Config for Xiaomi Pad 6 (pipa) — Mesa freedreno + eglfs KMS
# evdev touch/keyboard/mouse are built into qt5-plugin-platform-eglfs.
# Do NOT install qt5-plugin-generic-evdev — duplicates plugins and breaks touch.
EGL_PLATFORM=drm
QT_QPA_EGLFS_KMS_CONFIG=/etc/eglfs-config.json
QT_QPA_EGLFS_INTEGRATION=eglfs_kms
QT_QPA_PLATFORM=eglfs
QT_QPA_EGLFS_PHYSICAL_WIDTH=143
QT_QPA_EGLFS_PHYSICAL_HEIGHT=228
QT_QPA_EGLFS_HIDECURSOR=1
QT_QPA_EGLFS_ALWAYS_SET_MODE=1
QT_QPA_GENERIC_PLUGINS=evdevtouch,evdevmouse,evdevkeyboard
QT_OPENGL=es2
MESA_LOADER_DRIVER_OVERRIDE=msm
QML_FIXED_ANIMATION_STEP=no
QSG_FIXED_ANIMATION_STEP=no
LIPSTICK_OPTIONS=""
