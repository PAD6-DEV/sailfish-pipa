# Config for Xiaomi Pad 6 (pipa) — mainline mesa eglfs_kms
QT_QPA_EGLFS_KMS_CONFIG=/etc/eglfs-config.json
QT_QPA_EGLFS_INTEGRATION=eglfs_kms
QT_QPA_PLATFORM=eglfs
# Physical size ~11" 1800x2880 portrait
QT_QPA_EGLFS_PHYSICAL_WIDTH=143
QT_QPA_EGLFS_PHYSICAL_HEIGHT=228
QT_QPA_EGLFS_DISABLE_INPUT=1
LIPSTICK_OPTIONS="-plugin evdevtouch -plugin evdevkeyboard -plugin evdevmouse"
