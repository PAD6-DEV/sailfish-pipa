name: Build Sailfish pipa rootfs

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - "droid-config-pipa/**"
      - "kernel-adaptation-pipa/**"
      - "droid-hal-version-pipa/**"
      - "image-ci/**"
      - "flash/**"
      - "scripts/**"
      - ".github/workflows/build-rootfs.yml"

permissions:
  contents: read
  actions: write

concurrency:
  group: sailfish-pipa-rootfs
  cancel-in-progress: true

env:
  SDK_IMAGE: coderus/sailfishos-platform-sdk-base:4.6.0.13

jobs:
  build-adaptation-and-rootfs:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull Platform SDK image
        run: docker pull "$SDK_IMAGE"

      - name: Verify mic in SDK
        run: |
          docker run --rm "$SDK_IMAGE" bash -lc 'command -v mic; mic --help 2>&1 | head -5 || true'

      - name: Build adaptation RPMs + mic rootfs in SDK
        run: |
          set -eux
          docker run --rm --privileged \
            -v "$GITHUB_WORKSPACE:/sailfish-pipa" \
            -v "$GITHUB_WORKSPACE:/parentroot/home/ayman/sailfish-pipa" \
            -w /sailfish-pipa \
            -e GITHUB_WORKSPACE=/sailfish-pipa \
            "$SDK_IMAGE" \
            bash -lc '
              set -eux
              mkdir -p repo/adaptation
              command -v mic

              # --- kernel RPM (placeholder Image if missing) ---
              cd kernel-adaptation-pipa
              mkdir -p prebuilt/boot
              if [ ! -f prebuilt/boot/Image ]; then
                echo "CI placeholder kernel" > prebuilt/boot/Image
              fi
              if command -v rpmbuild >/dev/null 2>&1; then
                mkdir -p "$HOME/rpmbuild"/{SOURCES,SPECS,RPMS,BUILD}
                tar -C . -czf "$HOME/rpmbuild/SOURCES/kernel-adaptation-pipa-6.14.0.tar.gz" prebuilt || true
                rpmbuild -bb --define "_topdir $HOME/rpmbuild" rpm/kernel-adaptation-pipa.spec \
                  || rpmbuild -bb --define "_topdir $HOME/rpmbuild" --target aarch64 rpm/kernel-adaptation-pipa.spec \
                  || true
                find "$HOME/rpmbuild/RPMS" -name "*.rpm" -exec cp -v {} /sailfish-pipa/repo/adaptation/ \; || true
              else
                echo "rpmbuild not in SDK image"
              fi
              cd /sailfish-pipa

              # --- droid-config (best-effort) ---
              cd droid-config-pipa
              if command -v mb2 >/dev/null 2>&1; then
                mb2 build || true
              elif command -v rpmbuild >/dev/null 2>&1; then
                rpmbuild -bb --define "_topdir $HOME/rpmbuild" rpm/droid-config-pipa.spec || true
                find "$HOME/rpmbuild/RPMS" -name "droid-config*.rpm" -exec cp -v {} /sailfish-pipa/repo/adaptation/ \; || true
              fi
              cd /sailfish-pipa

              # --- createrepo ---
              if ! command -v createrepo_c >/dev/null 2>&1 && ! command -v createrepo >/dev/null 2>&1; then
                zypper -n in createrepo_c || zypper -n in createrepo || true
              fi
              createrepo_c repo/adaptation || createrepo repo/adaptation || mkdir -p repo/adaptation/repodata
              ls -la repo/adaptation || true

              # --- mic ---
              cd image-ci
              source root.env
              source pipa/pipa.env
              export WORKING_DIRECTORY=pipa
              test -e /parentroot/home/ayman/sailfish-pipa/repo/adaptation
              ./run-mic.sh
            '

      - name: Pack flashable rootfs raw (optional)
        if: success()
        run: |
          set -eux
          TBZ=$(ls -1 image-ci/pipa/sfe-pipa-*/sfe-pipa-*.tar.bz2 | head -1)
          mkdir -p flash/out
          sudo apt-get update -qq
          sudo apt-get install -y -qq e2fsprogs rsync
          sudo bash flash/pack-rootfs.sh "$TBZ" flash/out || true
          ls -lh image-ci/pipa/sfe-pipa-* || true
          ls -lh flash/out || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sailfish-pipa-rootfs
          path: |
            image-ci/pipa/sfe-*/**/*.tar.bz2
            image-ci/pipa/sfe-*/**/*.packages
            image-ci/pipa/sfe-*/**/*.ks
            image-ci/pipa/sfe-*/**/*.urls
            flash/out/**
            repo/adaptation/*.rpm
          if-no-files-found: warn
          retention-days: 30
