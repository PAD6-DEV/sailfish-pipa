name: Build Sailfish pipa image (rootfs + pack)

# Downloads U-Boot / Mesa / firmware / kernel from GitHub Pages prebuilts
# (publish-prebuilts.yml). Heavy builds stay in the publish workflow only.
on:
  workflow_dispatch:
  # After prebuilts land on Pages, pack a flash set automatically.
  workflow_run:
    workflows: ["Publish prebuilts to GitHub Pages"]
    types: [completed]
  push:
    branches: [master, main]
    paths:
      # Image/mic/pack only — do not overlap publish-prebuilts path filters
      # (avoids racing Pages before blobs exist).
      - "image-ci/**"
      - "flash/**"
      - "kernel-adaptation-pipa/**"
      - "droid-hal-version-pipa/**"
      - ".github/workflows/build-rootfs.yml"

permissions:
  contents: read
  actions: write

concurrency:
  group: sailfish-pipa-image
  cancel-in-progress: true

env:
  SDK_IMAGE: coderus/sailfishos-platform-sdk-base:4.6.0.13
  PREBUILTS_BASE: https://pad6-dev.github.io/sailfish-pipa/prebuilts
  UBOOT_URL: https://pad6-dev.github.io/sailfish-pipa/prebuilts/u-boot-xiaomi-pipa.img
  MESA_URL: https://pad6-dev.github.io/sailfish-pipa/prebuilts/mesa-freedreno-sfos-aarch64.tar.gz
  FIRMWARE_URL: https://pad6-dev.github.io/sailfish-pipa/prebuilts/xiaomi-pipa-firmware.tar.gz
  KERNEL_URL: https://pad6-dev.github.io/sailfish-pipa/prebuilts/linux-pipa-7.0.8-21-aarch64.pkg.tar.xz

jobs:
  build-rootfs:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull Platform SDK image
        run: docker pull "$SDK_IMAGE"

      - name: Sync sparse into bootstrap package
        run: |
          set -eux
          rm -rf bootstrap/droid-config-pipa/sparse
          cp -a droid-config-pipa/sparse bootstrap/droid-config-pipa/sparse

      - name: Build bootstrap RPMs + mic rootfs in SDK
        run: |
          set -eux
          docker run --rm --privileged \
            -v "$GITHUB_WORKSPACE:/sailfish-pipa" \
            -v "$GITHUB_WORKSPACE:/parentroot/home/ayman/sailfish-pipa" \
            -w /sailfish-pipa \
            "$SDK_IMAGE" \
            bash -lc '
              set -eux
              mkdir -p repo/adaptation
              zypper -n in createrepo_c rpm-build tar gzip || true
              ./bootstrap/build-rpms.sh
              test "$(find repo/adaptation -name "*.rpm" | wc -l)" -ge 3
              createrepo_c repo/adaptation || createrepo repo/adaptation
              sed -i "s|https://pad6-dev.github.io/sailfish-pipa/adaptation/|file:///parentroot/home/ayman/sailfish-pipa/repo/adaptation|" \
                image-ci/pipa/Jolla-@RELEASE@-pipa-@ARCH@.ks
              cd image-ci
              source root.env
              source pipa/pipa.env
              export WORKING_DIRECTORY=pipa
              ./run-mic.sh
            '

      - name: Upload rootfs tarball
        uses: actions/upload-artifact@v4
        with:
          name: sailfish-pipa-rootfs-tbz
          path: |
            image-ci/pipa/sfe-*/**/*.tar.bz2
            image-ci/pipa/sfe-*/**/*.packages
            image-ci/pipa/sfe-*/**/*.ks
            image-ci/pipa/sfe-*/**/*.urls
            repo/adaptation/*.rpm
          if-no-files-found: error
          retention-days: 30

  pack-flash-set:
    needs: [build-rootfs]
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download rootfs tarball
        uses: actions/download-artifact@v4
        with:
          name: sailfish-pipa-rootfs-tbz
          path: artifacts-rootfs

      - name: Fetch Pages prebuilts + stage kernel
        run: |
          set -eux
          sudo apt-get update -qq
          sudo apt-get install -y -qq e2fsprogs rsync zstd wget
          TBZ=$(find artifacts-rootfs -name 'sfe-pipa-*.tar.bz2' | head -1)
          test -s "$TBZ"
          echo "TBZ=$TBZ" >> "$GITHUB_ENV"
          mkdir -p u-boot-pipa/out mesa-pipa/out firmware-pipa/out /tmp/kernel-pkg
          wget -q --show-progress -O u-boot-pipa/out/u-boot-xiaomi-pipa.img "$UBOOT_URL" \
            || { echo "::error::Missing U-Boot on Pages. Run 'Publish prebuilts' first ($UBOOT_URL)"; exit 1; }
          wget -q --show-progress -O mesa-pipa/out/mesa-freedreno-sfos-aarch64.tar.gz "$MESA_URL" \
            || { echo "::error::Missing Mesa on Pages. Run 'Publish prebuilts' first ($MESA_URL)"; exit 1; }
          wget -q --show-progress -O firmware-pipa/out/xiaomi-pipa-firmware.tar.gz "$FIRMWARE_URL" \
            || { echo "::error::Missing firmware on Pages. Run 'Publish prebuilts' first ($FIRMWARE_URL)"; exit 1; }
          wget -q --show-progress -O /tmp/kernel-pkg/linux-pipa.pkg.tar.xz "$KERNEL_URL" \
            || { echo "::error::Missing kernel on Pages. Run 'Publish prebuilts' first ($KERNEL_URL)"; exit 1; }
          test -s u-boot-pipa/out/u-boot-xiaomi-pipa.img
          test -s mesa-pipa/out/mesa-freedreno-sfos-aarch64.tar.gz
          test -s firmware-pipa/out/xiaomi-pipa-firmware.tar.gz
          chmod +x kernel-adaptation-pipa/scripts/stage-prebuilt-kernel.sh
          bash kernel-adaptation-pipa/scripts/stage-prebuilt-kernel.sh /tmp/kernel-pkg/linux-pipa.pkg.tar.xz
          test -s kernel-adaptation-pipa/prebuilt/boot/Image

      - name: Pack flash set (U-Boot + Mesa + firmware + linux rootfs)
        run: |
          set -eux
          mkdir -p flash/out
          chmod +x flash/pack-flashables.sh
          sudo TARGET_PART=linux \
            bash flash/pack-flashables.sh \
            --rootfs-tbz "$TBZ" \
            --kernel-prebuilt "$GITHUB_WORKSPACE/kernel-adaptation-pipa/prebuilt" \
            --uboot-img "$GITHUB_WORKSPACE/u-boot-pipa/out/u-boot-xiaomi-pipa.img" \
            --mesa-tar "$GITHUB_WORKSPACE/mesa-pipa/out/mesa-freedreno-sfos-aarch64.tar.gz" \
            --firmware-tar "$GITHUB_WORKSPACE/firmware-pipa/out/xiaomi-pipa-firmware.tar.gz" \
            --outdir "$GITHUB_WORKSPACE/flash/out" \
            --target-part linux
          ls -lh flash/out
          test -s flash/out/u-boot-xiaomi-pipa.img
          test -s flash/out/sfos_rootfs.raw
          grep -qx linux flash/out/target-part.txt

      - name: Upload flash set
        uses: actions/upload-artifact@v4
        with:
          name: sailfish-pipa-flash
          path: |
            flash/out/u-boot-xiaomi-pipa.img
            flash/out/sfos_rootfs.raw
            flash/out/target-part.txt
          if-no-files-found: error
          retention-days: 30
