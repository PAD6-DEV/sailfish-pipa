name: Build Sailfish pipa rootfs

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - "droid-config-pipa/**"
      - "kernel-adaptation-pipa/**"
      - "droid-hal-version-pipa/**"
      - "bootstrap/**"
      - "image-ci/**"
      - "flash/**"
      - "scripts/**"
      - ".github/workflows/build-rootfs.yml"

permissions:
  contents: read
  actions: write

concurrency:
  group: sailfish-pipa-rootfs
  cancel-in-progress: true

env:
  SDK_IMAGE: coderus/sailfishos-platform-sdk-base:4.6.0.13

jobs:
  build-adaptation-and-rootfs:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull Platform SDK image
        run: docker pull "$SDK_IMAGE"

      - name: Verify mic in SDK
        run: |
          docker run --rm "$SDK_IMAGE" bash -lc 'command -v mic; mic --help 2>&1 | head -5'

      - name: Build bootstrap RPMs + mic rootfs in SDK
        run: |
          set -eux
          docker run --rm --privileged \
            -v "$GITHUB_WORKSPACE:/sailfish-pipa" \
            -v "$GITHUB_WORKSPACE:/parentroot/home/ayman/sailfish-pipa" \
            -w /sailfish-pipa \
            "$SDK_IMAGE" \
            bash -lc '
              set -eux
              mkdir -p repo/adaptation
              # Bootstrap RPMs (no mb2 target required)
              zypper -n in createrepo_c rpm-build tar gzip || true
              ./bootstrap/build-rpms.sh
              test "$(find repo/adaptation -name "*.rpm" | wc -l)" -ge 3
              # mic
              cd image-ci
              source root.env
              source pipa/pipa.env
              export WORKING_DIRECTORY=pipa
              ./run-mic.sh
            '

      - name: Pack flashable rootfs raw
        if: success()
        run: |
          set -eux
          TBZ=$(ls -1 image-ci/pipa/sfe-pipa-*/sfe-pipa-*.tar.bz2 | head -1)
          test -s "$TBZ"
          mkdir -p flash/out
          sudo apt-get update -qq
          sudo apt-get install -y -qq e2fsprogs rsync
          sudo bash flash/pack-rootfs.sh "$TBZ" flash/out
          ls -lh "$TBZ" flash/out

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sailfish-pipa-rootfs
          path: |
            image-ci/pipa/sfe-*/**/*.tar.bz2
            image-ci/pipa/sfe-*/**/*.packages
            image-ci/pipa/sfe-*/**/*.ks
            image-ci/pipa/sfe-*/**/*.urls
            flash/out/**
            repo/adaptation/*.rpm
          if-no-files-found: error
          retention-days: 30
