name: Publish adaptation RPMs to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - "bootstrap/**"
      - "droid-config-pipa/**"
      - "scripts/stage-adaptation-pages.sh"
      - "scripts/createrepo-local.sh"
      - ".github/workflows/publish-adaptation-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: sailfish-pipa-pages
  cancel-in-progress: true

env:
  SDK_IMAGE: coderus/sailfishos-platform-sdk-base:4.6.0.13

jobs:
  build-and-publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync sparse into bootstrap
        run: |
          set -eux
          rm -rf bootstrap/droid-config-pipa/sparse
          cp -a droid-config-pipa/sparse bootstrap/droid-config-pipa/sparse

      - name: Build bootstrap adaptation RPMs
        run: |
          set -eux
          docker pull "$SDK_IMAGE"
          docker run --rm --privileged \
            -v "$GITHUB_WORKSPACE:/sailfish-pipa" \
            -w /sailfish-pipa \
            "$SDK_IMAGE" \
            bash -lc '
              set -eux
              mkdir -p repo/adaptation
              zypper -n in createrepo_c rpm-build tar gzip || true
              ./bootstrap/build-rpms.sh
              test "$(find repo/adaptation -name "*.rpm" | wc -l)" -ge 3
              createrepo_c repo/adaptation || createrepo repo/adaptation
            '

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Stage Pages site
        run: |
          chmod +x scripts/stage-adaptation-pages.sh
          ./scripts/stage-adaptation-pages.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
